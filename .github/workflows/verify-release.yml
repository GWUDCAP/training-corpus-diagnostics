name: verify-release

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify committed release artifacts
        run: python scripts/verify_release_artifacts.py
      - name: Validate scorecard registry
        run: python scripts/validate_scorecard_submission.py --registry scorecard/registry

